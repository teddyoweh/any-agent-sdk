name: release

# Tag-driven publish to PyPI using trusted publishing (OIDC). No long-lived
# API token. Pre-release tags (vX.Y.ZrcN, aN, bN, devN) go to TestPyPI;
# everything else goes to PyPI.
#
# See RELEASING.md for the runbook and one-time trusted publisher setup.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  test:
    name: test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test
        env:
          ANY_AGENT_MOCK: "1"
        run: python -m pytest -q

  build:
    name: build sdist + wheel
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches pyproject version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PYPROJECT=$(python -c "import tomllib,sys; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          echo "Tag: $TAG"
          echo "pyproject: $PYPROJECT"
          if [ "$TAG" != "$PYPROJECT" ]; then
            echo "::error::Tag v$TAG does not match pyproject.toml version $PYPROJECT"
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if echo "$TAG" | grep -Eq "(rc|a|b|dev)[0-9]+$"; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: publish to PyPI
    needs: build
    if: needs.build.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/any-agent-sdk/${{ needs.build.outputs.version }}/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: publish to TestPyPI
    needs: build
    if: needs.build.outputs.is_prerelease == 'true'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/any-agent-sdk/${{ needs.build.outputs.version }}/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  github-release:
    name: draft GitHub release
    needs: [build, publish-pypi]
    if: needs.build.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          python - <<'PY' > release-notes.md
          import re, sys
          version = "${{ needs.build.outputs.version }}"
          text = open("CHANGELOG.md").read()
          # Grab the [X.Y.Z] section up to the next [vN.M.K] or end.
          pat = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          m = re.search(pat, text, flags=re.DOTALL)
          if not m:
              print(f"No CHANGELOG entry for {version}; using empty notes.", file=sys.stderr)
              print("See CHANGELOG.md for details.")
          else:
              print(m.group(1).strip())
          PY
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*
          draft: true
          prerelease: false
